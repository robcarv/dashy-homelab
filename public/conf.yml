appConfig:
  theme: dracula
  customCss: >
    @media (min-width: 1400px) {
      .home .item-group-container:not(.item-size-large) { grid-template-columns: repeat(4, 1fr); }
    }
    @media (min-width: 1100px) and (max-width: 1399px) {
      .home .item-group-container:not(.item-size-large) { grid-template-columns: repeat(3, 1fr); }
    }
    .item-group .item-group-heading { font-size: 1.0rem !important; letter-spacing: 0.3px; }
    .item-group .item-group-subtitle { font-size: 0.75rem !important; opacity: 0.6; }
    .item-group.item-size-medium .item-group-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)) !important; }
    .item .item-title { font-size: 0.75rem !important; }
    .item .item-description { font-size: 0.6rem !important; }
    .glances-current-cores, .glances-current-mem, .glances-cpu-temp, .glances-disk-space {
      min-height: 60px !important; padding: 6px !important;
    }
    .glances-current-cores .glances-label, .glances-current-mem .glances-label,
    .glances-cpu-temp .glances-label, .glances-disk-space .glances-label { font-size: 0.65rem !important; }
    .weather-widget { min-height: 90px !important; }
    iframe { border-radius: 8px !important; }
    .clock-widget { min-height: 70px !important; padding: 5px !important; }
    .clock-widget .clock-time { font-size: 1.3rem !important; }
    .clock-widget .clock-date { font-size: 0.65rem !important; }
  fontAwesomeKey: c94dc2b452
  enableFontAwesome: true
  hideSettings: true
  auth:
    users:
      - user: robert
        hash: 3F5CD94C55B20ADEA34EC11DE451928E952A51899C5891602C69F05310501CE3
        type: admin
  preventWriteToDisk: true
  webSearch:
    searchEngine: duckduckgo
    openingMethod: newtab
  statusCheckInterval: 60

sections:

  # ═════════════════════════════════════════════════════════════════════════
  #  1. NOW PLAYING
  # ═════════════════════════════════════════════════════════════════════════
  # NOW PLAYING
  - name: 📻 Dublin Calling - Now Playing
    icon: fas fa-broadcast-tower
    displayData:
      itemSize: medium
    items:
      - title: Listen Live
        description: ▶️ Tune in now!
        icon: hl-azuracast
        url: https://dublincalling.duckdns.org/public/dublincalling
        color: '#1DB954'
        statusCheck: true
      - title: Request Song
        description: 💬 Via Telegram
        icon: hl-telegram
        url: https://t.me/Siteschanges_bot
        color: '#229ED9'
      - title: Radio Dashboard
        description: ⚙️ Admin
        icon: hl-azuracast
        url: https://dublincalling.duckdns.org/login
        color: '#7C3AED'
    widgets:
      - type: embed
        options:
          html: |
            <div id="radio-widget" style="font-family:system-ui;background:linear-gradient(135deg,#1a1a2e,#16213e);border-radius:12px;padding:16px;color:#fff;text-align:center">
              <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
                <a href="https://dublincalling.duckdns.org/public/dublincalling" target="_blank">
                  <img id="radio-art" src="https://dublincalling.duckdns.org/api/nowplaying/dublincalling/art" width="120" height="120" style="border-radius:10px;object-fit:cover" alt="Album Art">
                </a>
                <div style="flex:1;text-align:left;min-width:0">
                  <div id="radio-title" style="font-size:16px;font-weight:700;color:#00d2d3">—</div>
                  <div id="radio-artist" style="font-size:14px;color:#ccc;margin-top:2px">—</div>
                  <div id="radio-album" style="font-size:12px;color:#888;margin-top:1px">—</div>
                </div>
              </div>
              <audio controls style="width:100%;border-radius:8px;margin-bottom:10px">
                <source src="https://dublincalling.duckdns.org/listen/dublincalling/radio.mp3" type="audio/mpeg">
              </audio>
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
                <div style="background:rgba(255,255,255,0.06);border-radius:8px;padding:8px">
                  <div style="font-size:9px;text-transform:uppercase;color:#888">Ouvintes</div>
                  <div id="radio-listeners" style="font-size:18px;font-weight:700;color:#1DB954">—</div>
                </div>
                <div style="background:rgba(255,255,255,0.06);border-radius:8px;padding:8px">
                  <div style="font-size:9px;text-transform:uppercase;color:#888">Duração</div>
                  <div id="radio-duration" style="font-size:18px;font-weight:700;color:#00d2d3">—</div>
                </div>
              </div>
              <div style="background:rgba(255,255,255,0.04);border-radius:8px;padding:8px;margin-bottom:10px;text-align:left">
                <div style="font-size:9px;text-transform:uppercase;color:#888;margin-bottom:4px">⏭️ Próxima</div>
                <div id="radio-next-text" style="font-size:12px;color:#ccc">—</div>
              </div>
              <div style="text-align:left">
                <div style="font-size:9px;text-transform:uppercase;color:#888;margin-bottom:4px">🎵 Tocadas Agora</div>
                <div id="radio-history-list"></div>
              </div>
            </div>
            <script>
            setTimeout(async function(){
              try {
                const r = await fetch('https://dublincalling.duckdns.org/api/nowplaying/dublincalling');
                const d = await r.json();
                const np = d.now_playing || {};
                const s = np.song || {};
                const nxt = (d.playing_next && d.playing_next.song) || {};
                const hist = d.song_history || [];
                const ls = d.listeners || {};
                const $ = (id) => document.getElementById(id);
                $('radio-title').textContent = s.title || '—';
                $('radio-artist').textContent = s.artist || '—';
                $('radio-album').textContent = (s.album ? '💿 '+s.album : '') + (s.year ? ' · '+s.year : '');
                $('radio-listeners').textContent = (ls.total||0) + ' ouvinte' + (ls.total!==1?'s':'');
                const dur = np.duration || 0;
                $('radio-duration').textContent = Math.floor(dur/60) + ':' + String(dur%60).padStart(2,'0');
                $('radio-next-text').textContent = nxt.artist ? nxt.artist+' - '+nxt.title : '—';
                const hl = $('radio-history-list');
                hl.innerHTML = hist.slice(0,5).map(h => {
                  const so = h.song || {};
                  return '<div style="font-size:11px;color:#999;padding:2px 0;border-bottom:1px solid rgba(255,255,255,0.04)">🎵 '+(so.artist||'?')+' - '+(so.title||'?')+'</div>';
                }).join('') || '<div style="font-size:11px;color:#666">—</div>';
              } catch(e) {
                document.getElementById('radio-title').textContent = 'Offline';
                document.getElementById('radio-artist').textContent = 'Rádio temporariamente indisponível';
              }
            }, 100);
            </script>
        id: embed_nowplaying

